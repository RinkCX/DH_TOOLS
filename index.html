<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匕首工坊 · 工具索引</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080807;
            --bg-surface: #12100e;
            --bg-card: #181512;
            --bg-card-hover: #1e1a16;
            --border: #27231e;
            --border-hover: #5a4538;
            --accent: #c49b6c;
            --accent-rgb: 196, 155, 108;
            --accent-red: #8b3a2a;
            --accent-red-rgb: 139, 58, 42;
            --text-primary: #e0d6c8;
            --text-secondary: #8a7e72;
            --text-tertiary: #5a4e44;
            --font-heading: "Cinzel", Georgia, serif;
            --font-body: "Source Sans 3", system-ui, sans-serif;
            --radius-container: 20px;
            --radius-card: 14px;
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            min-height: 100vh;
            font-family: var(--font-body);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 3vw, 2.5rem) 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景纹理：CSS 噪点 + 径向光晕 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(var(--accent-rgb), 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 80% 80%, rgba(var(--accent-red-rgb), 0.04) 0%, transparent 70%);
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .container {
            max-width: 880px;
            width: 100%;
            background: rgba(18, 16, 14, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-container);
            padding: clamp(1.8rem, 4vw, 2.8rem) clamp(1.2rem, 3vw, 2.2rem);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(var(--accent-rgb), 0.04);
            position: relative;
            z-index: 1;
        }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            margin-bottom: clamp(2rem, 4vw, 3rem);
            position: relative;
        }
        .header-mark {
            display: inline-block;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin-bottom: 1.2rem;
        }
        .header h1 {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: clamp(1.4rem, 3.5vw, 1.9rem);
            letter-spacing: 0.12em;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        .header h1 .accent {
            color: var(--accent-red);
        }
        .header .subtitle {
            font-family: var(--font-body);
            font-size: 0.78rem;
            color: var(--text-tertiary);
            letter-spacing: 0.16em;
            margin-top: 0.4rem;
            text-transform: uppercase;
        }

        /* ===== 分区 ===== */
        .section {
            margin-bottom: clamp(1.5rem, 3vw, 2.2rem);
        }
        .section:last-of-type {
            margin-bottom: 0;
        }
        .section-head {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(var(--accent-rgb), 0.12);
        }
        .section-head .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }
        .section-head .label {
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
        }
        .section-head .label.red {
            color: var(--accent-red);
        }

        /* ===== 卡片网格 ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 240px), 1fr));
            gap: 0.9rem;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 1.3rem 1.1rem 1.1rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.35s var(--ease-out);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.35s var(--ease-out);
            box-shadow: inset 0 0 0 1px rgba(var(--accent-rgb), 0.25);
            pointer-events: none;
        }
        .card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(var(--accent-rgb), 0.08) inset;
        }
        .card:hover::after {
            opacity: 1;
        }
        .card:active {
            transform: translateY(-1px);
            transition-duration: 0.1s;
        }

        /* 卡片左侧装饰线 */
        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 2px;
            background: var(--border);
            border-radius: 0 1px 1px 0;
            transition: background 0.35s var(--ease-out);
        }
        .card:hover::before {
            background: var(--accent);
        }

        .card-icon {
            margin-bottom: 0.6rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.35s var(--ease-out);
        }
        .card-icon svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        .card:hover .card-icon {
            color: var(--accent-red);
        }

        .card-title {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-primary);
            margin-bottom: 0.15rem;
            letter-spacing: 0.04em;
        }
        .card-desc {
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.55;
            flex: 1;
        }
        .card-arrow {
            margin-top: 0.8rem;
            align-self: flex-end;
            font-family: var(--font-heading);
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
            transition: color 0.35s var(--ease-out), transform 0.35s var(--ease-out);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            text-transform: uppercase;
        }
        .card-arrow svg {
            width: 0.8rem;
            height: 0.8rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .card:hover .card-arrow {
            color: var(--accent-red);
            transform: translateX(3px);
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: clamp(1.5rem, 3vw, 2.2rem);
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-tertiary);
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .footer a svg {
            width: 0.85rem;
            height: 0.85rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .footer a:hover {
            color: var(--accent);
        }
        .footer .sep {
            color: var(--border);
        }

        /* ===== 入场动效 ===== */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .anim-in {
            animation: fadeUp 0.6s var(--ease-out) both;
        }
        .anim-1 { animation-delay: 0.05s; }
        .anim-2 { animation-delay: 0.12s; }
        .anim-3 { animation-delay: 0.19s; }
        .anim-4 { animation-delay: 0.26s; }
        .anim-5 { animation-delay: 0.33s; }
        .anim-6 { animation-delay: 0.40s; }

        /* ===== 响应式 ===== */
        @media (max-width: 500px) {
            .container {
                border-radius: 14px;
            }
            .header h1 {
                font-size: 1.25rem;
                letter-spacing: 0.08em;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 1.1rem 1rem 1rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .anim-in { animation: none; }
            .card { transition: none; }
        }
    </style>
</head>
