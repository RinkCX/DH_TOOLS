<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匕首工坊 · 工具索引</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d0d;
            background: radial-gradient(ellipse at 50% 0%, #1a1210 0%, #0d0d0d 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #cdc5b7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 880px;
            width: 100%;
            background: rgba(16, 14, 12, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #2a2220;
            border-radius: 20px;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(120, 60, 40, 0.1) inset;
        }

        /* ===== 标题 ===== */
        .header {
            text-align: center;
            margin-bottom: 2.8rem;
            position: relative;
        }
        .header h1 {
            font-weight: 500;
            font-size: 1.6rem;
            letter-spacing: 4px;
            color: #d4b8a0;
            text-transform: uppercase;
        }
        .header h1 span {
            color: #b34a3a;
            font-weight: 400;
        }
        .header .subtitle {
            font-size: 0.75rem;
            color: #6a5c52;
            letter-spacing: 2px;
            margin-top: 0.3rem;
        }

        /* ===== 分区标题 ===== */
        .section {
            margin-bottom: 2.5rem;
        }
        .section:last-child {
            margin-bottom: 0;
        }
        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #a07060;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.2rem;
            padding-left: 0.5rem;
            border-left: 3px solid #8b3a2a;
            line-height: 1;
        }

        /* ===== 卡片网格 ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }
        .card {
            background: #1a1614;
            border: 1px solid #2e2824;
            border-radius: 14px;
            padding: 1.2rem 1rem 1rem;
            text-decoration: none;
            color: #cdc5b7;
            transition: all 0.25s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: #7a4a3a;
            background: #1f1a17;
            box-shadow: 0 8px 30px rgba(140, 40, 30, 0.15);
            transform: translateY(-2px);
        }
        .card-icon {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #a07060;
            line-height: 1;
        }
        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #e8d9c8;
            margin-bottom: 0.2rem;
            letter-spacing: 0.3px;
        }
        .card-desc {
            font-size: 0.78rem;
            color: #7a6c62;
            line-height: 1.5;
            flex: 1;
        }
        .card .enter-btn {
            margin-top: 0.7rem;
            align-self: flex-end;
            font-size: 0.7rem;
            color: #b34a3a;
            background: transparent;
            border: 1px solid #3a2a22;
            padding: 0.2rem 0.7rem;
            border-radius: 5px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .card:hover .enter-btn {
            border-color: #b34a3a;
            background: rgba(180, 50, 30, 0.1);
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px solid #2a2220;
            text-align: center;
            font-size: 0.7rem;
            color: #4a3e36;
            letter-spacing: 1px;
        }
        .footer a {
            color: #7a5c4a;
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: #b34a3a;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 500px) {
            .container {
                padding: 1.5rem 1rem;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="section">

        <div class="section">

            <div class="card-grid">
                <a class="card" href="https://rinkcx.github.io/DH_TOOLS/%E6%88%91%E7%9A%84%E8%BD%A6%E6%8A%80%E5%A6%82%E4%BD%95%EF%BC%9FGM%E5%B7%A5%E5%85%B7%E6%94%B9.html" target="_blank">
                    <div class="card-icon">🎮</div>

                    <div class="card-desc">GM主持面板 · 限速/恐惧/座驾/倒计时全面控制。</div>
                    <div class="enter-btn">→ 进入</div>
                </a>
                <a class="card" href="https://rinkcx.github.io/DH_TOOLS/%E6%88%91%E7%9A%84%E8%BD%A6%E6%8A%80%E5%A6%82%E4%BD%95%EF%BC%9F%E7%8E%A9%E5%AE%B6%E8%BD%A6%E5%8D%A1%E5%99%A8.html" target="_blank">
                    <div class="card-icon">📋</div>
                    <div class="card-title">《我车何》玩家车卡器</div>
                    <div class="card-desc">创建亡命车手与座驾。</div>
                    <div class="enter-btn">→ 进入</div>
                </a>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <a href="https://github.com/rinkcx/DH_TOOLS" target="_blank">📂 GitHub 仓库</a> · 
            <span>v1.1</span> · 
            <span>🗡️ 匕首之心</span>
        </div>
    </div>
</body>
</html>
