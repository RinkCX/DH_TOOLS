<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匕首之心 · 战役构筑器 V3.14</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Oswald:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 浅色模式 */
            --bg-body: #f4f6f9;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --accent-color: #e05d44;
            --accent-hover: #c54e36;
            --scene-accent: #319795; /* 环境卡强调色 (Teal) */
            --track-empty: #ffffff;
            --track-border: #cbd5e0;
            --track-fill: #e05d44;
            --note-bg: #fffbeb;
            --note-border: #fcd34d;
            --favorite-color: #e53e3e;
            --source-tag-bg: #edf2f7;
            --source-tag-text: #4a5568;
            --nav-width: 250px;
            --radius: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-body: #111827;
            --bg-card: #1f2937;
            --bg-sidebar: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --track-empty: #374151;
            --track-border: #4b5563;
            --track-fill: #e05d44;
            --note-bg: #422006;
            --note-border: #78350f;
            --source-tag-bg: #2d3748;
            --source-tag-text: #cbd5e0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s; }

        /* Loading */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top: 4px solid var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header */
        .app-header { background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 64px; flex-shrink: 0; z-index: 50; box-shadow: var(--shadow-sm); }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent-color); display:flex; align-items:center; gap:8px; line-height: 1; }
        .signature { font-size: 0.8rem; color: var(--text-muted); opacity: 0.8; border-left: 2px solid var(--border-color); padding-left: 12px; margin-left: 12px; height: 24px; display: flex; align-items: center; white-space: nowrap; }
        .nav-tabs { display: flex; gap: 8px; height: 100%; }
        .nav-item { display: flex; align-items: center; padding: 0 16px; cursor: pointer; color: var(--text-muted); font-weight: 600; border-bottom: 3px solid transparent; transition: all 0.2s; height: 100%; font-size: 0.95rem; }
        .nav-item:hover { color: var(--accent-color); background: rgba(0,0,0,0.02); }
        .nav-item.active { color: var(--accent-color); border-bottom-color: var(--accent-color); }
        .theme-toggle { cursor: pointer; padding: 0; border-radius: 50%; background: var(--track-empty); border: 1px solid var(--border-color); width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }

        /* Main Layout */
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; }
        .page { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 24px; animation: fadeIn 0.25s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Components */
        .card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 24px; margin-bottom: 24px; border: 1px solid var(--border-color); }
        .btn { background: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 7px 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-outline:hover { border-color: var(--text-main); color: var(--text-main); background: var(--track-empty); }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
        .btn-text { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 4px 8px; }
        .btn-text:hover { color: var(--accent-color); }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-body); color: var(--text-main); font-family: inherit; transition: 0.2s; font-size: 0.95rem; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(224, 93, 68, 0.1); }
        
        /* --- 1. Overview --- */
        .banner-wrapper { border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow-md); background: var(--bg-card); border: 1px solid var(--border-color); position: relative; transition: all 0.3s ease; }
        .banner-img-container { width: 100%; height: 300px; background-color: var(--bg-body); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; transform-origin: center center; }
        .banner-placeholder { text-align: center; color: var(--text-muted); }
        .banner-controls-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: flex; justify-content: space-between; align-items: center; opacity: 0; transition: opacity 0.2s; }
        .banner-wrapper:hover .banner-controls-overlay { opacity: 1; }
        .banner-slider-group { display: flex; gap: 15px; align-items: center; }
        .banner-slider-group input[type=range] { width: 80px; height: 4px; padding: 0; margin: 0; background: #666; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .dash-header-input { font-size: 2rem; font-family: 'Oswald', sans-serif; border: none; border-bottom: 2px solid transparent; background: transparent; padding: 5px 0; font-weight: bold; color: var(--accent-color); width: 100%; transition: 0.2s; }
        .dash-header-input:focus { border-bottom-color: var(--accent-color); background: var(--bg-body); }

        /* --- 2. 章节页 --- */
        .split-layout { display: grid; grid-template-columns: var(--nav-width) 1fr; gap: 0; height: 100%; border: 1px solid var(--border-color); border-radius: var(--radius); overflow: hidden; background: var(--bg-card); box-shadow: var(--shadow-md); }
        .toc-panel { border-right: 1px solid var(--border-color); padding: 15px; overflow-y: auto; background: var(--bg-body); }
        .toc-title { font-size: 0.8rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; padding-left: 5px; }
        .toc-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; color: var(--text-muted); margin-bottom: 4px; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; }
        .toc-item:hover { background: rgba(0,0,0,0.05); color: var(--text-main); }
        .toc-item.active { background: white; color: var(--accent-color); font-weight: bold; box-shadow: var(--shadow-sm); border-left: 4px solid var(--accent-color); }
        [data-theme="dark"] .toc-item.active { background: var(--bg-card); }
        .session-content-area { padding: 30px; overflow-y: auto; background: var(--bg-card); }
        .content-display a { color: #e05d44; text-decoration: none; border-bottom: 1px dotted #e05d44; transition: 0.2s; }
        .content-display a:hover { background: rgba(224, 93, 68, 0.1); border-bottom-style: solid; }
        .content-display { white-space: pre-wrap; line-height: 1.6; word-break: break-all; }

        /* --- 3. 遭遇页 --- */
        .enc-layout { display: grid; grid-template-columns: var(--nav-width) 1fr 280px; gap: 24px; height: 100%; }
        .enc-toc-container { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border-color); overflow: hidden; box-shadow: var(--shadow-md); height: 100%; display: flex; flex-direction: column; }
        .enc-toc-list { flex: 1; overflow-y: auto; padding: 15px; }
        .enc-toc-footer { padding: 15px; border-top: 1px solid var(--border-color); background: var(--bg-body); }
        .btn-new-enc { width: 100%; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-new-enc:hover { border-color: var(--accent-color); color: var(--accent-color); background: white; }
        
        /* Unified Card Structure */
        .enc-main-card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border-color); height: 100%; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-md); }
        .enc-header { padding: 30px 30px 0 30px; flex-shrink: 0; background: var(--bg-card); border-bottom: 1px solid var(--border-color); }
        .enc-body { flex: 1; overflow-y: auto; padding: 25px 30px; background: var(--bg-body); } 
        
        .enc-title-input { font-size: 1.8rem; font-family: 'Oswald', sans-serif; border: none; background: transparent; padding: 0; font-weight: bold; color: var(--accent-color); width: 100%; margin-bottom: 15px; }
        .env-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 0.95rem; }
        .env-detail-btn { background: white; border: 1px solid var(--border-color); color: var(--text-muted); padding: 5px 12px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .env-detail-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .note-wrapper { margin-bottom: 20px; }
        .note-toggle { font-size: 0.8rem; color: var(--text-muted); cursor: pointer; margin-bottom: 4px; display: inline-block; }
        .note-toggle:hover { color: var(--accent-color); text-decoration: underline; }
        .note-box { background: var(--note-bg); border: 1px solid var(--note-border); border-radius: 6px; padding: 15px; color: #78350f; font-size: 0.95rem; width: 100%; min-height: 60px; font-family: inherit; resize: vertical; display: none; }
        .note-box.visible { display: block; }
        
        .adv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .adv-card { background: #ffffff; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; position: relative; transition: 0.2s; box-shadow: var(--shadow-sm); }
        [data-theme="dark"] .adv-card { background: #2d3748; }
        .adv-card:hover { border-color: var(--accent-color); box-shadow: var(--shadow-md); }
        .adv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .adv-name { font-weight: 700; font-size: 1.05rem; font-family: 'Oswald', sans-serif; color: var(--text-main); }
        .detail-pill { display: inline-block; border: 1px solid var(--accent-color); color: var(--accent-color); border-radius: 12px; padding: 1px 8px; font-size: 0.75rem; cursor: pointer; margin-left: 8px; font-family: 'Roboto', sans-serif; font-weight: normal; background: white; }
        .detail-pill:hover { background: var(--accent-color); color: white; }
        .track-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .track-label { font-size: 0.8rem; font-weight: bold; color: var(--favorite-color); width: 45px; text-transform: uppercase; }
        .track-label.str { color: #4a5568; } [data-theme="dark"] .track-label.str { color: #a0aec0; }
        .track-boxes { display: flex; gap: 4px; flex-wrap: wrap; }
        .track-box { width: 20px; height: 20px; border: 2px solid var(--track-border); cursor: pointer; background: var(--track-empty); border-radius: 3px; }
        .track-box.checked { background: var(--track-fill); border-color: var(--track-fill); }
        .btn-remove-adv { position: absolute; top: 10px; right: 10px; color: var(--favorite-color); background: none; border: none; font-size: 1.2rem; cursor: pointer; line-height: 1; opacity: 0.5; }
        .btn-remove-adv:hover { opacity: 1; }
        
        /* Mechanics - V3.14 RESIZABLE RESTORED */
        .mechanics-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .mech-card { 
            background: #ffffff; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; 
            display: flex; flex-direction: column; position: relative; transition: border-color 0.2s; 
            min-width: 220px; max-width: 100%; box-shadow: var(--shadow-sm); 
            /* RESIZE ENABLED */
            resize: horizontal; overflow: hidden; 
        }
        [data-theme="dark"] .mech-card { background: #2d3748; }
        .mech-card:hover { border-color: var(--accent-color); box-shadow: var(--shadow-md); }
        /* V3.14 Resize Handle Hint */
        .mech-card::-webkit-resizer {
             background-color: transparent;
             background-image: linear-gradient(135deg, transparent 50%, var(--border-color) 50%);
        }
        
        .mech-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px dashed var(--border-color); gap: 5px; }
        .mech-title { flex: 1; min-width: 0; }
        .mech-title input { border: none; background: transparent; font-weight: bold; font-size: 1rem; width: 100%; min-width: 80px; font-family: 'Oswald'; color: var(--text-main); }
        .mech-title input:focus { border-bottom: 1px solid var(--accent-color); }
        .mech-options { display: flex; align-items: center; gap: 3px; flex-shrink: 0; font-size: 0.7rem; color: #666; }
        
        .mech-body { flex: 1; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
        .mech-max-input { width: 30px; border: none; border-bottom: 1px solid var(--border-color); background: transparent; text-align: center; font-size: 0.75rem; color: var(--text-muted); font-weight: bold; }
        
        .countdown-die { width: 50px; height: 50px; background: var(--accent-color); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; font-family: 'Oswald'; font-weight: bold; cursor: pointer; transition: 0.2s; user-select: none; }
        .countdown-die.zero { background: #e53e3e; animation: pulse 1s infinite; }
        .countdown-die:active { transform: scale(0.95); }
        
        .countdown-boxes { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .countdown-box { width: 18px; height: 18px; border: 2px solid var(--accent-color); background: var(--track-empty); cursor: pointer; border-radius: 2px; }
        .countdown-box.filled { background: var(--accent-color); }

        .counter-dots { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .counter-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--track-border); cursor: pointer; transition: 0.2s; }
        .counter-dot.active { background: #3182ce; box-shadow: 0 0 5px rgba(49, 130, 206, 0.5); }
        .counter-number { font-size: 1.8rem; font-weight: bold; font-family: 'Oswald'; }
        
        .mech-narrative { margin-top: 8px; font-size: 0.8rem; display: block; }
        
        .mech-input-group { display: flex; align-items: baseline; margin-bottom: 2px; }
        .mech-label { width: 35px; font-weight: bold; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; }
        .mech-input { flex: 1; border: none; border-bottom: 1px solid var(--border-color); background: transparent; padding: 1px 4px; font-size: 0.85rem; color: var(--text-main); }
        .mech-input:focus { border-bottom-color: var(--accent-color); outline: none; background: rgba(0,0,0,0.02); }

        .btn-ctrl { background: white; border: 1px solid var(--border-color); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; color: var(--text-main); font-weight: bold; }
        .btn-ctrl:hover { border-color: var(--text-muted); }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }

        /* Quick Ref */
        .quick-ref-area { border-top: 2px dashed var(--border-color); margin-top: 30px; padding-top: 20px; }
        .quick-ref-title { font-family: 'Oswald', sans-serif; color: var(--text-muted); font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* V3.14: Red Border for Enemies */
        .stat-block { 
            font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--text-main); 
            background: var(--bg-card); padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; 
            border: 1px solid var(--accent-color); /* RED */
            border-left-width: 5px; 
            box-shadow: var(--shadow-sm); 
        }
        [data-theme="dark"] .stat-block { background: #2d3748; }
        .sb-header { font-family: 'Oswald', sans-serif; font-weight: bold; font-size: 1.15rem; color: var(--accent-color); display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; margin-bottom: 8px; }
        .sb-meta { font-style: italic; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }
        .sb-row { margin-bottom: 4px; line-height: 1.4; }
        .sb-label { font-weight: bold; color: var(--text-main); font-variant: small-caps; }
        .sb-tactics { margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.03); border-radius: 4px; border-left: 2px solid var(--text-muted); font-style: italic; color: #555; }
        [data-theme="dark"] .sb-tactics { background: rgba(255,255,255,0.05); color: #ccc; }
        
        /* Scene Block overrides */
        .scene-block { 
            border-color: var(--scene-accent); 
            border-left-color: var(--scene-accent); 
        }
        .scene-block .sb-header { color: var(--scene-accent); }

        .special-trait-box { background: #fffbf0; border: 1px solid #fde68a; border-radius: 8px; padding: 12px; margin-top: 15px; font-size: 0.95rem; }
        [data-theme="dark"] .special-trait-box { background: rgba(254, 252, 232, 0.05); border-color: rgba(253, 230, 138, 0.3); }
        .st-title { color: var(--accent-color); font-weight: bold; font-family: 'Oswald'; margin-bottom: 5px; font-size: 1.1rem; }
        .st-row { margin-bottom: 4px; }
        .st-label { font-weight: bold; color: var(--text-main); }
        .st-dashed-sep { margin-top:15px; padding-top:10px; border-top:2px dashed var(--accent-color); }

        .pinned-panel { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border-color); padding: 15px; overflow-y: auto; box-shadow: var(--shadow-md); height: 100%; }
        .pinned-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; }
        .pinned-item:hover { background: var(--bg-body); border-color: var(--border-color); }
        .pinned-img { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; background: var(--bg-body); border: 1px solid var(--border-color); }

        /* --- 4. 卡片库 (V3.7 Multi-select) --- */
        .lib-controls-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .lib-header-row { display: flex; justify-content: space-between; align-items: center; }
        .lib-filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: var(--bg-card); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
        .search-bar-wrapper { position: relative; flex: 1; max-width: 400px; }
        .search-bar-wrapper input { padding-left: 36px; border-radius: 20px; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); opacity: 0.7; }
        
        .filter-group { display: flex; gap: 5px; align-items: center; border-right: 1px solid var(--border-color); padding-right: 10px; margin-right: 5px; flex-wrap: wrap;}
        .filter-group:last-child { border-right: none; }
        .filter-label { font-size: 0.8rem; font-weight: bold; color: var(--text-muted); margin-right: 5px; }
        .filter-pill { padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-muted); transition: 0.2s; user-select: none; }
        .filter-pill.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .add-source-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px dashed var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        .add-source-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        
        .lib-section-header { margin: 20px 0 10px 0; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 1.1rem; color: var(--text-muted); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .lib-card { position: relative; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border-color); background: var(--bg-card); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }

        .lib-info { padding: 8px; text-align: center; background: var(--bg-card); flex: 1; display: flex; flex-direction: column; justify-content: center; }

        .recent-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: var(--text-muted); }
        .recent-body { display: none; margin-top: 10px; overflow-x: auto; padding-bottom: 10px; white-space: nowrap; }
        .recent-body.open { display: flex; gap: 10px; }
        .recent-card { width: 140px; flex-shrink: 0; } 

        .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .icon-option { font-size: 2rem; cursor: pointer; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid transparent; }
        .icon-option:hover { background: var(--track-empty); border-color: var(--border-color); }

        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; display: none; opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(3px); }
        .detail-sidebar { position: fixed; top: 0; right: -650px; width: 650px; height: 100%; background: var(--bg-sidebar); box-shadow: -10px 0 30px rgba(0,0,0,0.3); z-index: 101; transition: right 0.3s cubic-bezier(0.2, 1, 0.3, 1); display: flex; flex-direction: column; }
        .detail-sidebar.active { right: 0; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        @media (max-width: 1200px) { .enc-layout { grid-template-columns: 220px 1fr; } .pinned-panel { display: none; } }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } .enc-layout { grid-template-columns: 1fr; } .enc-toc-container { display: none; } }

<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div style="font-weight:bold; color:var(--text-muted); letter-spacing:1px;">LOADING DATA...</div>

            <div class="banner-wrapper" id="banner-area">

                        <label>Y</label> <input type="range" min="0" max="100" value="50" oninput="updateBannerConfig('posY', this.value)">

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                        <div class="form-group"><label>本团基调</label><textarea id="info-tone" placeholder="情感基调..."></textarea></div>
                        <div class="form-group"><label>本团主题</label><textarea id="info-themes" placeholder="Focus & Avoid..."></textarea></div>

                    <div class="form-group"><label>GM 目标</label><textarea id="info-goals" placeholder="创意期望..." style="min-height:60px;"></textarea></div>

        <!-- 4. 卡片 -->

                    <!-- Normal Controls -->
                    <div id="lib-normal-ctrls" style="display:flex; gap:10px;">
                        <button class="btn-outline" onclick="toggleSelectMode()">☑️ 多选模式</button>
                        <button class="btn-outline" onclick="triggerBatchExport()">📤 批量导出</button>
                        <button class="btn-outline" onclick="document.getElementById('json-import').click()">📥 导入</button>
                        <input type="file" id="json-import" accept=".json" multiple style="display:none;" onchange="importJSON(this)">
                    </div>

                    <!-- Select Mode Controls -->
                    <div id="lib-select-ctrls" style="display:none; gap:10px;">
                        <button class="btn-danger btn-sm" onclick="deleteSelectedCards()">🗑️ 删除选中 (<span id="sel-count">0</span>)</button>
                        <button class="btn-outline btn-sm" onclick="exportSelectedCards()">📤 导出选中</button>
                        <button class="btn-outline btn-sm" onclick="selectAll()">全选</button>
                        <button class="btn-outline btn-sm" onclick="toggleSelectMode()">退出多选</button>
                    </div>

                <div class="lib-filter-row">
                    <div class="search-bar-wrapper"><span class="search-icon">🔍</span><input type="text" placeholder="搜索卡牌名称/标签..." oninput="renderLibrary()" id="lib-search"></div>
                    
                    <div class="filter-group">

                    <div class="filter-group" id="source-filter-group">

                    <div class="filter-group">
                        <span class="filter-label">收藏:</span>

                    </div>

                    <div class="filter-group" style="border:none;">
                        <button class="btn-sm btn-outline" onclick="openBulkSourceModal()">✏️ 批量改所属</button>
                    </div>
                </div>
            </div>

            <!-- 最近导入 -->
            <div class="recent-section">
                <div class="recent-header" onclick="toggleRecent()">
                    <span>🆕 最近导入 (Recent)</span> <span id="recent-toggle-icon">▼</span>

    <!-- 侧边详情 -->
    <div class="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="detail-sidebar" id="detail-sidebar">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; background:var(--bg-card);">
            <h3 style="margin:0;">卡牌详情</h3>
            <button class="btn-text" onclick="closeSidebar()">✕ 关闭</button>

        <div id="ds-content" style="padding:25px; overflow-y:auto; flex:1;"></div>

    <!-- 图标选择器 -->

        <div style="background:var(--bg-card); padding:20px; border-radius:8px; width:400px; box-shadow:var(--shadow-md);">

        <div style="background:var(--bg-card); padding:20px; border-radius:8px; width:350px; box-shadow:var(--shadow-md);">
            <h3 style="margin-top:0;">批量修改所属</h3>
            <p style="font-size:0.9rem; color:var(--text-muted);">将当前筛选出的卡片所属修改为：</p>
            <select id="bulk-source-select" style="width:100%; padding:10px; margin-bottom:15px; border-radius:4px; border:1px solid var(--border-color);"></select>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1;" onclick="applyBulkSource()">确定修改</button>
                <button class="btn-outline" style="flex:1;" onclick="document.getElementById('bulk-source-modal').style.display='none'">取消</button>
            </div>
        </div>
    </div>

    <script>
        // IndexedDB Wrapper
        class SimpleDB {
            constructor(dbName, storeName) { this.dbName = dbName; this.storeName = storeName; this.db = null; }
            async open() {
                if (this.db) return this.db;
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.dbName, 1);
                    req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains(this.storeName)) db.createObjectStore(this.storeName); };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
                    req.onerror = (e) => reject('DB Error: ' + e.target.error);
                });
            }
            async get(key) { await this.open(); return new Promise((resolve, reject) => { const tx = this.db.transaction(this.storeName, 'readonly'); const store = tx.objectStore(this.storeName); const req = store.get(key); req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error); }); }
            async set(key, value) { await this.open(); return new Promise((resolve, reject) => { const tx = this.db.transaction(this.storeName, 'readwrite'); const store = tx.objectStore(this.storeName); const req = store.put(value, key); req.onsuccess = () => resolve(true); req.onerror = () => reject(req.error); }); }
        }

        const db = new SimpleDB('DaggerheartDB', 'CampaignStore');
        const DB_KEY = 'campaign_data_v3';
        
        let appData = {
            banner: { src: '', posX: 50, posY: 50, scale: 100, visible: true },
            info: {}, sessions: [], encounters: [], library: [], 
            sources: ['Core', 'Void', 'HB'] 
        };
        let currentEncounterId = null;
        let saveTimeout = null;
        
        let activeFilters = { type: { enemy: true, scene: true }, source: {}, fav: false };
        let isSelectMode = false;
        let selectedIds = new Set();
        
        const PRESET_ICONS = ["👹", "💀", "🐺", "🧛", "🧟", "🐉", "🕷️", "🦂", "🐍", "🦑", "🏔️", "🏰", "🏚️", "🌲", "🌊", "🔥", "⛺", "💎", "📜", "⚔️", "🛡️", "🩸", "👁️", "🌑"];

        document.addEventListener('DOMContentLoaded', async () => {
            const loader = document.getElementById('loading-screen');
            await loadData();
            document.getElementById('banner-upload-input').addEventListener('change', handleBannerUpload);
            renderAll();
            setTimeout(() => { loader.style.opacity = 0; setTimeout(() => loader.style.display = 'none', 500); }, 500);
        });

        async function saveData() {
            appData.info = {
                name: document.getElementById('info-name')?.value || appData.info.name,
                framework: document.getElementById('info-framework')?.value || appData.info.framework,
                concept: document.getElementById('info-concept')?.value || appData.info.concept,
                tone: document.getElementById('info-tone')?.value || appData.info.tone,
                themes: document.getElementById('info-themes')?.value || appData.info.themes,
                goals: document.getElementById('info-goals')?.value || appData.info.goals,
                gm: document.getElementById('info-gm')?.value || appData.info.gm,
                resources: document.getElementById('info-resources')?.value || appData.info.resources,
                platform: document.getElementById('info-platform')?.value || appData.info.platform,
                players: document.getElementById('info-players')?.value || appData.info.players,
                time: document.getElementById('info-time')?.value || appData.info.time
            };
            const status = document.getElementById('save-status'); if(status) status.innerText = "💾 正在保存...";
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try { await db.set(DB_KEY, appData); if(status) { status.innerText = "✅ 已保存"; setTimeout(() => status.innerText = "", 2000); } } 
                catch (e) { if(status) status.innerText = "❌ 保存失败"; }
            }, 500);
        }

        async function loadData() {
            try {
                let dbData = await db.get(DB_KEY);
                if (!dbData) {
                    const v2Data = await db.get('campaign_data_v2'); 
                    if(v2Data) dbData = v2Data;
                    else { const lsData = localStorage.getItem('dh_builder_v2_2') || localStorage.getItem('dh_builder_v2_1'); if (lsData) dbData = JSON.parse(lsData); }
                }
                if (dbData) {
                    appData = { ...appData, ...dbData };
                    if(!appData.sources) appData.sources = ['Core', 'Void', 'HB'];
                    appData.library.forEach(item => {
                        if(!item.data.source) item.data.source = 'HB';
                        if(!item.importTime) item.importTime = 0;
                        if(!item.icon) item.icon = ''; 
                    });
                    appData.sources.forEach(s => { if(activeFilters.source[s] === undefined) activeFilters.source[s] = true; });
                    await db.set(DB_KEY, appData);
                }
            } catch (e) { console.error("Load Error", e); }
        }

        function renderAll() { renderInfoPage(); renderSessions(); renderEncounterTOC(); if(currentEncounterId) renderEncounterDetail(currentEncounterId); renderLibrary(); }
        function switchTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('page-' + tabId).classList.add('active');
            if(tabId === 'info') renderInfoPage();
            if(tabId === 'sessions') renderSessions();
            if(tabId === 'encounters') { renderEncounterTOC(); if(currentEncounterId) renderEncounterDetail(currentEncounterId); }
            if(tabId === 'cards') renderLibrary();
        }
        function toggleTheme() { const body = document.body; if(body.getAttribute('data-theme') === 'dark') body.removeAttribute('data-theme'); else body.setAttribute('data-theme', 'dark'); }

        // --- 1. Overview ---
        function renderInfoPage() { const ids = ['info-name','info-framework','info-concept','info-tone','info-themes','info-goals','info-gm','info-resources','info-platform','info-players','info-time']; ids.forEach(id => { const el = document.getElementById(id); const key = id.replace('info-',''); if(el && appData.info[key]) el.value = appData.info[key]; if(el) el.onchange = saveData; }); updateBannerUI(); }
        function triggerBannerUpload() { document.getElementById('banner-upload-input').click(); }
        function handleBannerUpload(e) { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = function(evt) { appData.banner.src = evt.target.result; appData.banner.visible = true; appData.banner.posX = 50; appData.banner.posY = 50; appData.banner.scale = 100; updateBannerUI(); saveData(); }; reader.readAsDataURL(file); } }
        function updateBannerUI() {
            const area = document.getElementById('banner-area'); const img = document.getElementById('banner-img-el'); const ph = document.getElementById('banner-placeholder'); const btn = document.getElementById('banner-toggle-btn');
            btn.textContent = appData.banner.visible ? '👁️ 隐藏横幅' : '👁️ 显示横幅';
            area.style.display = appData.banner.visible ? 'block' : 'none';
            if(appData.banner.src) { img.src = appData.banner.src; img.style.display = 'block'; img.style.objectPosition = `${appData.banner.posX}% ${appData.banner.posY}%`; img.style.transform = `scale(${appData.banner.scale / 100})`; ph.style.display = 'none'; } else { img.style.display = 'none'; ph.style.display = 'block'; }
        }
        function updateBannerConfig(key, val) { appData.banner[key] = val; updateBannerUI(); if(Math.random()>0.7) saveData(); }
        function toggleBannerVisibility() { appData.banner.visible = !appData.banner.visible; updateBannerUI(); saveData(); }
        function copyAnnouncement() {
            const i = appData.info;
            const text = `模组名：${i.name || ''}\n战役框架：${i.framework || ''}\n资源：${i.resources || ''}\n主持人与QQ号：${i.gm || ''}\n团类型与平台：${i.platform || ''}\n玩家人数：${i.players || ''}\n开团时间：${i.time || ''}\n本团概念：${i.concept || ''}\n本团目标：${i.goals || ''}\n本团基调：${i.tone || ''}\n本团主题：${i.themes || ''}`;
            navigator.clipboard.writeText(text).then(() => showToast('✅ 公告已复制到剪贴板'));
        }

        // --- 2. Sessions ---

        function toggleContentEdit(idx, isEdit) { const display = document.getElementById(`content-display-${idx}`); const edit = document.getElementById(`content-edit-${idx}`); if(isEdit) { display.style.display = 'none'; edit.style.display = 'block'; edit.focus(); } else { display.innerHTML = parseLinks(edit.value); display.style.display = 'block'; edit.style.display = 'none'; } }
        function renderSessionsTOC() { const tocItems = document.querySelectorAll('#session-toc .toc-item'); appData.sessions.forEach((s, i) => { if(tocItems[i]) tocItems[i].textContent = s.title || 'S'+(i+1); }); }

        function updateSession(i, field, val) { appData.sessions[i][field] = val; saveData(); }

        // --- 3. Encounters ---
        function getLibItem(id) { return appData.library.find(i => i.id === id); }
        function renderEncounterTOC() { const c = document.getElementById('encounter-toc'); if(appData.encounters.length === 0) { c.innerHTML = '<div style="color:var(--text-muted); font-size:0.9rem;">暂无遭遇</div>'; return; } c.innerHTML = appData.encounters.map(e => `<div class="toc-item ${e.id === currentEncounterId ? 'active' : ''}" onclick="switchEncounter('${e.id}')">${e.name || '未命名'}</div>`).join(''); }
        function addEncounter() { const id = Date.now().toString(); appData.encounters.push({ id, name: '新遭遇', envId: '', notes: '', notesVisible:true, adversaries: [], countdowns: [], counters: [] }); currentEncounterId = id; saveData(); renderEncounterTOC(); renderEncounterDetail(id); }
        function switchEncounter(id) { currentEncounterId = id; renderEncounterTOC(); renderEncounterDetail(id); }
        function renderEncounterDetail(id) {

            let mechHTML = '';
            enc.countdowns.forEach((cd, idx) => {

                const narrative = `<div class="mech-narrative"><div class="mech-input-group"><div class="mech-label">激活</div><input class="mech-input" placeholder="何时触发..." value="${cd.trigger||''}" onchange="updateCountdown('${id}', ${idx}, 'trigger', this.value)"></div><div class="mech-input-group"><div class="mech-label">推进</div><input class="mech-input" placeholder="何时减少..." value="${cd.advance||''}" onchange="updateCountdown('${id}', ${idx}, 'advance', this.value)"></div><div class="mech-input-group"><div class="mech-label">效果</div><input class="mech-input" placeholder="归零时发生..." value="${cd.effect||''}" onchange="updateCountdown('${id}', ${idx}, 'effect', this.value)"></div></div>`;
                // V3.14: Added resize and manual width handling
                mechHTML += `<div class="mech-card" style="width:${cd.width||'auto'}" onmouseup="saveMechWidth('${id}', 'countdown', ${idx}, this)"><button class="btn-remove-adv" style="top:5px;right:5px;font-size:1rem;" onclick="removeCountdown('${id}', ${idx})">×</button><div class="mech-header"><div class="mech-title"><input type="text" value="${cd.label}" onchange="updateCountdown('${id}', ${idx}, 'label', this.value)"></div><div class="mech-options"><select style="border:none; background:transparent;" onchange="updateCountdown('${id}', ${idx}, 'type', this.value); renderEncounterDetail('${id}')"><option value="d4" ${cd.type==='d4'?'selected':''}>D4</option><option value="d6" ${cd.type==='d6'?'selected':''}>D6</option><option value="d8" ${cd.type==='d8'?'selected':''}>D8</option><option value="d12" ${cd.type==='d12'?'selected':''}>D12</option><option value="d20" ${cd.type==='d20'?'selected':''}>D20</option><option value="box" ${cd.type==='box'?'selected':''}>方格</option></select><span>Max:</span><input type="number" class="mech-max-input" value="${cd.max}" min="1" onchange="updateCountdown('${id}', ${idx}, 'max', this.value)"><span style="margin-left:5px; cursor:pointer;" onclick="updateCountdown('${id}', ${idx}, 'reset')">↺</span></div></div><div class="mech-body">${display}</div>${narrative}</div>`;
            });
            enc.counters.forEach((cnt, idx) => {

                // V3.14: Added resize and manual width handling
                mechHTML += `<div class="mech-card" style="width:${cnt.width||'auto'}" onmouseup="saveMechWidth('${id}', 'counter', ${idx}, this)"><button class="btn-remove-adv" style="top:5px;right:5px;font-size:1rem;" onclick="removeCounter('${id}', ${idx})">×</button><div class="mech-header"><div class="mech-title"><input type="text" value="${cnt.label}" onchange="updateCounter('${id}', ${idx}, 'label', this.value)"></div><div class="mech-options"><select style="border:none; background:transparent;" onchange="updateCounter('${id}', ${idx}, 'style', this.value); renderEncounterDetail('${id}')"><option value="number" ${cnt.style==='number'?'selected':''}>数字</option><option value="dots" ${cnt.style==='dots'?'selected':''}>Token</option></select></div></div><div class="mech-body" style="min-height:60px;">${display}</div><div class="mech-controls"><div class="btn-ctrl" onclick="updateCounter('${id}', ${idx}, 'add', -1)">-</div><div class="btn-ctrl" onclick="updateCounter('${id}', ${idx}, 'add', 1)">+</div></div></div>`;

                const track = (arr, type) => arr.map((chk, i) => `<div class="track-box ${chk?'checked':''}" onclick="toggleTrack('${id}',${idx},'${type}',${i})"></div>`).join('');
                advHTML += `<div class="adv-card"><button class="btn-remove-adv" onclick="removeAdv('${id}',${idx})">×</button><div class="adv-header"><div class="adv-name">${lib.data.name} #${idx+1} <span class="detail-pill" onclick="showSidebar('${lib.id}')">详情</span></div></div><div class="track-row"><span class="track-label">生命点</span><div class="track-boxes">${track(adv.hpState, 'hpState')}</div></div>${maxStr > 0 ? `<div class="track-row"><span class="track-label str">压力点</span><div class="track-boxes">${track(adv.strState, 'strState')}</div></div>` : ''}</div>`;
            });

            let quickRefHTML = ''; const uniqueAdvIds = [...new Set(enc.adversaries.map(a => a.libId))]; uniqueAdvIds.forEach(uid => { const e = getLibItem(uid); if(e) quickRefHTML += buildStatBlock(e); });

            // V3.12: Scene Block

                quickRefHTML = sceneBlock + quickRefHTML;
            }

            wrapper.innerHTML = `<div class="enc-header"><input type="text" class="enc-title-input" value="${enc.name}" oninput="updateEnc('${id}','name',this.value);renderEncounterTOC();"><div class="env-row"><strong>环境:</strong><span style="border-bottom:1px solid #ccc; padding:0 5px; min-width:100px;">${sceneName}</span><button class="env-detail-btn" onclick="openSceneSelector('${id}')">更换</button>${enc.envId ? `<button class="env-detail-btn" onclick="showSidebar('${enc.envId}')">详情</button>` : ''}<button class="env-detail-btn" style="margin-left:auto" onclick="addCountdown('${id}')">+ 倒计时</button><button class="env-detail-btn" onclick="addCounter('${id}')">+ 计数器</button></div><div class="note-wrapper"><span class="note-toggle" onclick="toggleNote('${id}')">${enc.notesVisible ? '▼ 隐藏备注' : '▶ 显示备注'}</span><textarea class="note-box ${enc.notesVisible?'visible':''}" placeholder="在此记录遭遇思路..." onchange="updateEnc('${id}','notes',this.value)">${enc.notes||''}</textarea></div></div><div class="enc-body"><div class="mechanics-grid">${mechHTML}</div><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;"><h4 style="margin:0; font-size:1.1rem; color:var(--text-main); font-family:sans-serif;">敌人列表</h4><button class="btn-sm" style="border:1px solid var(--border-color); background:white;" onclick="addAdvPrompt('${id}')">+ 添加敌人</button></div><div class="adv-grid">${advHTML || '<div style="color:var(--text-muted); font-style:italic;">暂无敌人</div>'}</div><div class="quick-ref-area"><div class="quick-ref-title"><span>📖</span> 战术速查</div>${quickRefHTML || '<div style="color:var(--text-muted); font-size:0.9rem;">添加卡牌后自动生成...</div>'}</div><div style="margin-top:30px; text-align:right;"><button class="btn-outline btn-sm" style="color:#e53e3e; border-color:#e53e3e;" onclick="deleteEnc('${id}')">删除此遭遇</button></div></div>`;
            renderPinned(enc, pinned);
        }
        function addCountdown(id) { const enc = appData.encounters.find(e => e.id === id); enc.countdowns.push({ label: '倒计时', type: 'd6', max: 6, current: 6, trigger:'', advance:'', effect:'', width: '300px' }); saveData(); renderEncounterDetail(id); }
        function removeCountdown(encId, idx) { appData.encounters.find(e => e.id === encId).countdowns.splice(idx, 1); saveData(); renderEncounterDetail(encId); }
        function updateCountdown(encId, idx, action, val) {
            const cd = appData.encounters.find(e => e.id === encId).countdowns[idx];
            if (action === 'label') cd.label = val; if (action === 'trigger') cd.trigger = val; if (action === 'advance') cd.advance = val; if (action === 'effect') cd.effect = val;
            if (action === 'type') { cd.type = val; cd.max = val.startsWith('d') ? parseInt(val.substring(1)) : 4; cd.current = cd.max; }

            if (action === 'tickBox') { const newVal = val + 1; cd.current = (cd.current === newVal) ? newVal - 1 : newVal; }
            if (action === 'reset') cd.current = cd.max;
            saveData(); renderEncounterDetail(encId);
        }
        function addCounter(id) { const enc = appData.encounters.find(e => e.id === id); enc.counters.push({ label: '资源点', style: 'number', current: 0, width: '250px' }); saveData(); renderEncounterDetail(id); }
        function removeCounter(encId, idx) { appData.encounters.find(e => e.id === encId).counters.splice(idx, 1); saveData(); renderEncounterDetail(encId); }
        function updateCounter(encId, idx, action, val) { const cnt = appData.encounters.find(e => e.id === encId).counters[idx]; if (action === 'label') cnt.label = val; if (action === 'style') cnt.style = val; if (action === 'add') cnt.current += val; if (action === 'val') cnt.current = val; if (cnt.current < 0) cnt.current = 0; saveData(); renderEncounterDetail(encId); }
        
        // V3.14: Save Width on MouseUp
        function saveMechWidth(encId, type, idx, el) {

        function buildStatBlock(item) { const d = item.data; let tactics = ''; if(d.motivation) tactics = `<div class="sb-tactics"><strong>战术/动机:</strong> ${d.motivation}</div>`; let stHTML = ''; if(d.specialTraits && d.specialTraits.length > 0) { stHTML += `<div class="st-dashed-sep"></div>`; d.specialTraits.forEach(st => { stHTML += `<div class="special-trait-box"><div class="st-title">${st.name}</div>${st.trigger ? `<div class="st-row"><span class="st-label">触发:</span> ${st.trigger}</div>` : ''}${st.choice ? `<div class="st-row"><span class="st-label">选择:</span> ${st.choice}</div>` : ''}<div style="margin-top:5px;">${st.effect}</div></div>`; }); } return `<div class="stat-block"><div class="sb-header"><div>${d.name}</div><div>难度 ${d.difficulty}</div></div><div class="sb-meta">Tier ${d.rank} ${d.type} | HP: ${d.health} | Stress: ${d.stress} | 阈值: ${d.threshold}</div><div class="sb-row"><span class="sb-label">攻击:</span> ${d.weaponName||'武器'} (${d.weaponRange}) +${d.attackBonus} (${d.damageDice} ${d.damageType})</div>${tactics}${(d.traits||[]).map(t => `<div class="sb-row"><span class="sb-label">${t.name}:</span> ${t.desc}</div>`).join('')}${stHTML}</div>`; }

        // V3.8 Fix: Updated selector for modal removal to avoid black screen bug

                        <select id="filter-tier" style="flex:1;"><option value="all">所有 Tier</option><option value="1">T1</option><option value="2">T2</option><option value="3">T3</option><option value="4">T4</option></select>
                        <select id="filter-source" style="flex:1;">${srcOptions}</select>
                        <label style="display:flex; align-items:center; gap:5px; font-size:0.8rem; white-space:nowrap;"><input type="checkbox" id="filter-fav">只看收藏</label>
                    </div>
                    <select id="tmp-sel" style="margin-bottom:15px; width:100%;"></select>
                    <div style="display:flex; gap:10px;">
                        <button class="btn" id="tmp-ok" style="flex:1;">确定</button>
                        <button class="btn-outline" id="tmp-cancel">取消</button>
                    </div>
                </div>`;
            document.body.appendChild(div);

            document.getElementById('tmp-cancel').onclick = () => div.remove();

            const updateList = () => {
                const ft = document.getElementById('filter-tier').value;
                const fs = document.getElementById('filter-source').value;
                const ff = document.getElementById('filter-fav').checked;

                const items = appData.library.filter(i => {
                    if(i.type !== 'scene') return false;
                    if(ft !== 'all' && i.data.rank != ft) return false;
                    if(fs !== 'all' && i.data.source !== fs) return false;
                    if(ff && !i.isFav) return false;
                    return true;
                });
                const sel = document.getElementById('tmp-sel');
                sel.innerHTML = items.length ? items.map(e=>`<option value="${e.id}">${e.data.name} (T${e.data.rank})</option>`).join('') : '<option disabled>无匹配环境</option>';
            };
            document.getElementById('filter-tier').onchange = updateList;
            document.getElementById('filter-source').onchange = updateList;
            document.getElementById('filter-fav').onchange = updateList;
            updateList();

            document.getElementById('tmp-ok').onclick = () => {
                const libId = document.getElementById('tmp-sel').value;
                if(libId) updateEnc(eid, 'envId', libId);
                saveData(); renderEncounterDetail(eid); 
                div.remove();
            }
        }

        // --- 4. Library ---
        function importJSON(input) { 
            const files = input.files; if(!files.length) return; 
            Array.from(files).forEach(f => { 
                const r = new FileReader(); 
                r.onload = e => { 
                    try { 
                        const raw = JSON.parse(e.target.result); 
                        const items = Array.isArray(raw) ? raw : [raw];
                        items.forEach(j => {
                            let type = (j.health!==undefined||j.threshold!==undefined) ? 'enemy' : 'scene'; 
                            appData.library.push({ id: Date.now().toString(36)+Math.random().toString(36).substr(2), type, data: j, isFav: false, icon: '', source: 'HB', importTime: Date.now() }); 
                        });
                        saveData(); renderLibrary(); 
                    } catch(err) {} 
                }; 
                r.readAsText(f); 
            }); 
            input.value=''; showToast('导入完成'); 
        }
        
        function toggleFilter(cat, val, el) { 
            if(cat==='fav') { activeFilters.fav = !activeFilters.fav; el.classList.toggle('active'); }
            else { activeFilters[cat][val] = !activeFilters[cat][val]; el.classList.toggle('active'); }
            renderLibrary();
        }
        function toggleRecent() {
            const body = document.getElementById('recent-content');
            const icon = document.getElementById('recent-toggle-icon');
            body.classList.toggle('open');
            icon.innerText = body.classList.contains('open') ? '▲' : '▼';
        }
        function addCustomSource() {
            const name = prompt("请输入新来源名称 (例如: 赛博朋克):");
            if(name) {
                const newSrc = `HB (${name})`;
                if(!appData.sources.includes(newSrc)) {
                    appData.sources.push(newSrc);
                    activeFilters.source[newSrc] = true;
                    saveData(); renderLibrary();
                }
            }
        }
        function removeSource(srcName) {
            if(['Core','Void','HB'].includes(srcName)) return alert("默认来源不可删除");
            if(confirm(`确定删除来源 "${srcName}" 吗？该分类下的卡片不会被删除。`)) {
                appData.sources = appData.sources.filter(s => s !== srcName);
                delete activeFilters.source[srcName];
                saveData(); renderLibrary();
            }
        }
        function openBulkSourceModal() {
            const list = getFilteredList();
            if(list.length === 0) return alert('当前筛选无卡片');
            document.getElementById('bulk-source-modal').style.display = 'flex';
            const sel = document.getElementById('bulk-source-select');
            sel.innerHTML = appData.sources.map(s => `<option value="${s}">${s}</option>`).join('');
        }
        function applyBulkSource() {
            const val = document.getElementById('bulk-source-select').value;
            const list = getFilteredList();
            list.forEach(item => item.data.source = val);
            saveData(); renderLibrary(); showToast(`已更新 ${list.length} 张卡片`);
            document.getElementById('bulk-source-modal').style.display = 'none';
        }
        function getFilteredList() {
            const term = document.getElementById('lib-search').value.toLowerCase();
            return appData.library.filter(i => {
                const matchesSearch = (i.data.name||'').toLowerCase().includes(term);
                const matchesType = activeFilters.type[i.type];
                const matchesSource = activeFilters.source[i.data.source || 'HB'] !== false;
                const matchesFav = activeFilters.fav ? i.isFav : true;
                return matchesSearch && matchesType && matchesSource && matchesFav;
            });
        }

        function renderLibrary() {
            const srcGroup = document.getElementById('source-filter-group');
            srcGroup.innerHTML = '<span class="filter-label">来源:</span>';
            appData.sources.forEach(src => {
                const isActive = activeFilters.source[src] !== false;
                const pill = document.createElement('span');
                pill.className = `filter-pill ${isActive?'active':''}`;
                pill.innerText = src;
                pill.onclick = () => toggleFilter('source', src, pill);
                if(!['Core','Void','HB'].includes(src)) { pill.oncontextmenu = (e) => { e.preventDefault(); removeSource(src); }; }
                srcGroup.appendChild(pill);
            });
            const addBtn = document.createElement('div');
            addBtn.className = 'add-source-btn';
            addBtn.innerText = '+';
            addBtn.onclick = addCustomSource;
            srcGroup.appendChild(addBtn);

            const list = getFilteredList();
            list.sort((a,b) => {
                if(a.type !== b.type) return a.type.localeCompare(b.type);
                const tA = parseInt(a.data.rank)||0; const tB = parseInt(b.data.rank)||0;
                if(tA !== tB) return tA - tB;
                return (a.data.name||'').localeCompare(b.data.name||'');
            });

            const renderSection = (items, title, icon) => {
                if (items.length === 0) return '';
                const cardsHtml = items.map(item => {
                    let src = '';
                    if(item.type==='enemy') src = item.data.imageSrc;
                    if(item.type==='scene') src = item.data.imageSettings?.src;
                    const hasImg = src && !src.includes('about:blank') && !src.includes('NO IMAGE');
                    const iconDisplay = item.icon ? item.icon : (item.type==='enemy'?'👹':'⛰️');
                    const subtitle = 'T' + (item.data.rank || '?');

                    return `
                    <div class="lib-card ${selectedIds.has(item.id)?'selected':''}" onclick="${isSelectMode ? `toggleCardSelection('${item.id}')` : `showSidebar('${item.id}')`}">
                        <div class="select-check">✔</div>
                        <div class="source-badge">${item.data.source || 'HB'}</div>
                        <div class="lib-fav-icon ${item.isFav?'active':''}" onclick="toggleFav('${item.id}');event.stopPropagation();">❤</div>
                        <div class="lib-img">
                            ${hasImg ? `<img src="${src}">` : `<span class="default-icon-display">${iconDisplay}</span>`}
                            <div style="position:absolute; bottom:5px; right:5px; opacity:0.5; font-size:1.2rem; cursor:pointer;" onclick="openIconModal('${item.id}');event.stopPropagation();">✎</div>
                        </div>
                        <div class="lib-info">
                            <div class="lib-title">${item.data.name}</div>
                            <div class="lib-sub">${subtitle}</div>
                        </div>
                    </div>`;
                }).join('');
                return `<div class="lib-section-header">${icon} ${title} <span style="font-size:0.8rem; margin-left:5px; opacity:0.5;">(${items.length})</span></div><div class="lib-grid">${cardsHtml}</div>`;
            };

            let html = '';
            const recents = appData.library.sort((a,b) => (b.importTime||0) - (a.importTime||0)).slice(0, 10);
            const recentHTML = recents.map(item => {
                 let src = (item.type==='enemy'?item.data.imageSrc:item.data.imageSettings?.src) || '';
                 if(!src || src.includes('about:blank')) src = '';
                 return `<div class="recent-card lib-card" onclick="showSidebar('${item.id}')"><div class="lib-img" style="height:80px;">${src?`<img src="${src}">`:`<span style="font-size:1.5rem;">${item.type==='enemy'?'👹':'⛰️'}</span>`}</div><div class="lib-info" style="padding:4px;"><div class="lib-title" style="font-size:0.75rem;">${item.data.name}</div></div></div>`
            }).join('');
            document.getElementById('recent-content').innerHTML = recentHTML;

            const favs = list.filter(i => i.isFav);
            if (favs.length > 0 && !activeFilters.fav) { html += renderSection(favs, '收藏夹', '⭐'); }

            if (list.length === 0) { html = '<div style="text-align:center; padding:40px; color:var(--text-muted);">未找到卡片，请导入JSON文件。</div>'; } 
            else {
                html += renderSection(list.filter(i => i.type === 'scene'), '场景', '⛰️');
                html += renderSection(list.filter(i => i.type === 'enemy'), '敌人', '👹');
            }
            document.getElementById('library-content').innerHTML = html;
        }
        function toggleFav(id) { const i = appData.library.find(x=>x.id===id); if(i) { i.isFav = !i.isFav; saveData(); renderLibrary(); } }
        let editingIconId = null;
        function openIconModal(id) { editingIconId = id; document.getElementById('icon-modal').style.display='flex'; const grid = document.getElementById('icon-grid'); grid.innerHTML = ''; PRESET_ICONS.forEach(ic => { const div = document.createElement('div'); div.className='icon-option'; div.innerText=ic; div.onclick = () => { appData.library.find(x=>x.id===editingIconId).icon = ic; saveData(); renderLibrary(); document.getElementById('icon-modal').style.display='none'; }; grid.appendChild(div); }); }
        
        function triggerBatchExport() {
            const list = getFilteredList();
            if(list.length === 0) return alert("当前筛选无卡片可导出");
            const exportData = list.map(item => ({...item.data, isNPC: item.type==='enemy', source: item.data.source || 'HB'})); 
            const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `DH_CardPack_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }
        
        function exportSingleCard(id) {
            const item = appData.library.find(i=>i.id===id);
            if(!item) return;
            const exportData = {...item.data, isNPC: item.type==='enemy', source: item.data.source || 'HB'};
            const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob); 
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = `${item.data.name || 'card'}.json`; 
            a.click();
        }

        // --- Sidebar & Helper ---
        function showSidebar(id) { const item = appData.library.find(i=>i.id===id); if(!item) return; const d = item.data; const md = t => (t||'').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/==(.*?)==/g,'<span style="color:var(--accent-color); background:rgba(224,93,68,0.1);">$1</span>'); 
            const sourceOptions = appData.sources.map(s => `<option value="${s}" ${d.source===s?'selected':''}>${s}</option>`).join('');
            const sourceSelector = `<div style="margin-bottom:15px; font-size:0.8rem; color:var(--text-muted);">所属: <select onchange="updateCardSource('${id}', this.value)" style="border:none; border-bottom:1px solid #ccc; background:transparent;">${sourceOptions}</select></div>`; 
            
            let stHTML = '';
            if(d.specialTraits && d.specialTraits.length > 0) {
                stHTML += `<div class="st-dashed-sep"></div>`;
                d.specialTraits.forEach(st => {
                    stHTML += `<div class="special-trait-box">
                        <div class="st-title">${st.name}</div>
                        ${st.trigger ? `<div class="st-row"><span class="st-label">触发:</span> ${st.trigger}</div>` : ''}
                        ${st.choice ? `<div class="st-row"><span class="st-label">选择:</span> ${st.choice}</div>` : ''}
                        <div style="margin-top:5px;">${st.effect}</div>
                    </div>`;
                });
            }

            let html = `<div>${sourceSelector}<h2 style="font-family:'sans-serif'; color:var(--accent-color); border-bottom:2px solid var(--accent-color); padding-bottom:10px;">${d.name}</h2>`; 
            if(item.type==='enemy') { html += `<p>Tier ${d.rank} ${d.type} | 难度 ${d.difficulty} | 阈值 ${d.threshold}</p><div style="background:var(--track-empty); padding:10px; border-radius:6px; margin-bottom:15px;"><strong>${d.weaponName||'Weapon'}</strong> (${d.weaponRange}): +${d.attackBonus} (${d.damageDice} ${d.damageType})</div><p>${md(d.description)}</p><p><strong>动机:</strong> ${md(d.motivation)}</p><h4>特性</h4>${(d.traits||[]).map(t=>`<div style="margin-bottom:8px;"><strong>${t.name}:</strong> ${md(t.desc)}</div>`).join('')}${stHTML}`; } 
            else { html += `<p>Tier ${d.rank} ${d.type} | 难度 ${d.difficulty}</p><p>${md(d.description)}</p><h4>特性</h4>${(d.traits||[]).map(t=>`<div style="margin-bottom:8px;"><strong>${t.name}</strong> (${t.type}): ${md(t.desc)}</div>`).join('')}${stHTML}`; } 
            let img = ''; if(item.type==='enemy') img = d.imageSrc; if(item.type==='scene') img = d.imageSettings?.src; if(img && !img.includes('about:blank') && !img.includes('NO IMAGE')) html += `<img src="${img}" style="width:100%; margin-top:20px; border-radius:8px;">`; 
            html += `<div style="margin-top:40px; text-align:right; display:flex; gap:10px; justify-content:flex-end;">
                <button class="btn-sm btn-outline" onclick="exportSingleCard('${id}')">📤 导出单卡</button>
                <button class="btn-sm btn-outline" style="color:#e53e3e; border-color:#e53e3e;" onclick="if(confirm('删除?')) { appData.library=appData.library.filter(x=>x.id!=='${id}'); saveData(); renderLibrary(); closeSidebar(); }">删除卡片</button>
            </div></div>`; 
            document.getElementById('ds-content').innerHTML = html; document.querySelector('.sidebar-overlay').classList.add('active'); document.getElementById('detail-sidebar').classList.add('active'); 
        }
        function updateCardSource(id, val) { const item = appData.library.find(i=>i.id===id); if(item) { item.data.source = val; saveData(); renderLibrary(); } }
        function closeSidebar() { document.querySelector('.sidebar-overlay').classList.remove('active'); document.getElementById('detail-sidebar').classList.remove('active'); }
        function showToast(msg, autoHide = true) { document.querySelectorAll('.app-toast').forEach(e => e.remove()); const div = document.createElement('div'); div.className = 'app-toast'; div.style.cssText = `position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(30, 41, 59, 0.95); color:white; padding:10px 20px; border-radius:30px; z-index:200; animation:fadeIn 0.3s; font-size:0.9rem; box-shadow:0 5px 15px rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1);`; div.textContent = msg; document.body.appendChild(div); if(autoHide) setTimeout(() => div.remove(), 2500); return autoHide ? null : div; }
        
        // V3.9: Fixed Multi-select Logic
        function toggleSelectMode() {
            isSelectMode = !isSelectMode;
            selectedIds.clear(); // V3.9: Clear on toggle (enter or exit)
            document.getElementById('sel-count').innerText = 0;
            const btns = document.getElementById('lib-normal-ctrls');
            const selBtns = document.getElementById('lib-select-ctrls');
            if (isSelectMode) { btns.style.display = 'none'; selBtns.style.display = 'flex'; }
            else { btns.style.display = 'flex'; selBtns.style.display = 'none'; }
            renderLibrary();
        }
        function toggleCardSelection(id) {
            if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
            renderLibrary();
            document.getElementById('sel-count').innerText = selectedIds.size;
        }
        function selectAll() {
            const list = getFilteredList();
            list.forEach(i => selectedIds.add(i.id));
            renderLibrary(); document.getElementById('sel-count').innerText = selectedIds.size;
        }
        function deleteSelectedCards() {
            if(selectedIds.size === 0) return;
            if(confirm(`确定删除这 ${selectedIds.size} 张卡片吗？`)) {
                appData.library = appData.library.filter(item => !selectedIds.has(item.id));
                toggleSelectMode(); // Exit mode
                saveData();
                renderLibrary();
            }
        }
        function exportSelectedCards() {
            if(selectedIds.size === 0) return;
            const list = appData.library.filter(item => selectedIds.has(item.id));
            const exportData = list.map(item => ({...item.data, isNPC: item.type==='enemy', source: item.data.source || 'HB'})); 
            const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `DH_Selected_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }

    </script>
</body>
</html>
